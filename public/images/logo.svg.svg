<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1000 1000">
  <defs>
    <style>
      .r{fill:#b30000}
      .t{font-family:Arial, sans-serif;font-size:78px;font-weight:bold;fill:#b30000}
      .w{fill:none;stroke:#ffffff;stroke-width:10}
    </style>
  </defs>

  <!-- outer ring -->
  <circle cx="500" cy="500" r="470" fill="none" stroke="#b30000" stroke-width="18"/>
  <circle cx="500" cy="500" r="435" fill="none" stroke="#b30000" stroke-width="42"/>

  <!-- segmented decoration -->
  <g transform="translate(500,500)">
    <g id="seg">
      <rect x="-18" y="-470" width="36" height="60" class="r" rx="5"/>
    </g>
    <!-- 24 segments -->
    <use href="#seg" transform="rotate(0)"/>
    <use href="#seg" transform="rotate(15)"/>
    <use href="#seg" transform="rotate(30)"/>
    <use href="#seg" transform="rotate(45)"/>
    <use href="#seg" transform="rotate(60)"/>
    <use href="#seg" transform="rotate(75)"/>
    <use href="#seg" transform="rotate(90)"/>
    <use href="#seg" transform="rotate(105)"/>
    <use href="#seg" transform="rotate(120)"/>
    <use href="#seg" transform="rotate(135)"/>
    <use href="#seg" transform="rotate(150)"/>
    <use href="#seg" transform="rotate(165)"/>
    <use href="#seg" transform="rotate(180)"/>
    <use href="#seg" transform="rotate(195)"/>
    <use href="#seg" transform="rotate(210)"/>
    <use href="#seg" transform="rotate(225)"/>
    <use href="#seg" transform="rotate(240)"/>
    <use href="#seg" transform="rotate(255)"/>
    <use href="#seg" transform="rotate(270)"/>
    <use href="#seg" transform="rotate(285)"/>
    <use href="#seg" transform="rotate(300)"/>
    <use href="#seg" transform="rotate(315)"/>
    <use href="#seg" transform="rotate(330)"/>
    <use href="#seg" transform="rotate(345)"/>
  </g>

  <!-- crescent -->
  <circle cx="455" cy="500" r="300" class="r"/>
  <circle cx="560" cy="500" r="275" fill="#fff"/>

  <!-- heart -->
  <path class="r" d="M500 305
  C500 250 430 235 405 285
  C380 235 310 250 310 325
  C310 390 390 440 405 475
  C420 440 500 390 500 325Z"
  transform="translate(95,-10) scale(1.15)"/>

  <!-- ECG -->
  <polyline points="430,430 470,430 485,430 500,395 510,455 525,420 545,430 590,430"
    fill="none" stroke="#fff" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- text -->
  <text x="500" y="650" text-anchor="middle" class="t">النادي الطبي</text>
</svg>
